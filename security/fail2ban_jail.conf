# Fail2Ban jail configuration for TWOM API
# Place this file in /etc/fail2ban/jail.d/twom-api.conf

[twom-api]
enabled = true
port = 5000
protocol = tcp
filter = twom-api
logpath = /tmp/twom_api_secure.log
maxretry = 5
findtime = 600
bantime = 3600
action = iptables-multiport[name=twom-api, port="5000", protocol=tcp]
