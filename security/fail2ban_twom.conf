# Fail2Ban filter for TWOM API
# Place this file in /etc/fail2ban/filter.d/twom-api.conf

[Definition]
failregex = ^.* - .*Rate limit exceeded from <HOST>.*$
            ^.* - .*Invalid.*from <HOST>.*$
            ^.* - .*Error response.*from <HOST>.*$
            ^<HOST> .* "GET \/api\/.*" (400|403|404|429|500)

ignoreregex =

[Init]
datepattern = ^%%Y-%%m-%%d %%H:%%M:%%S
